name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Lint TypeScript
        run: npm run lint

      - name: Type-check TypeScript
        run: npm run typecheck

      - name: Test TypeScript
        run: npm test

      - name: Build CLI
        run: npm run build

      - name: Smoke-test CLI
        run: |
          ./paios status
          ./paios status --json > /tmp/paios-status.json
          node --eval "JSON.parse(require('node:fs').readFileSync('/tmp/paios-status.json', 'utf8'))"
          data_root=$(mktemp -d)
          output=$(printf '%s\n' "CI knowledge note" | ./paios knowledge add-note --title "CI" --data-root "$data_root")
          record_id=$(printf '%s\n' "$output" | sed -n 's/^Captured note //p')
          ./paios knowledge show "$record_id" --data-root "$data_root"
          printf '%s\n' "CI imported document" > "$data_root/input.txt"
          ./paios knowledge add-file "$data_root/input.txt" --data-root "$data_root"
          ./paios knowledge search '"imported document"' --data-root "$data_root"
          ./paios knowledge rebuild --data-root "$data_root"
          indexed_root=$(mktemp -d)
          printf '%s\n' "CI indexed external document" > "$indexed_root/external.md"
          ./paios knowledge index "$indexed_root" --data-root "$data_root"
          backup_parent=$(mktemp -d)
          backup_root="$backup_parent/knowledge-backup"
          restored_root=$(mktemp -d)
          ./paios knowledge backup "$backup_root" --data-root "$data_root"
          rm -rf "$indexed_root"
          ./paios knowledge restore "$backup_root" --data-root "$restored_root"
          ./paios knowledge search '"imported document"' --data-root "$restored_root"
          test "$(./paios knowledge search '"indexed external"' --data-root "$restored_root")" = "No matching knowledge records."
          rm -rf "$data_root" "$backup_parent" "$restored_root"

      - name: Test Python tooling
        run: python3 -m unittest discover -s tests -v

      - name: Validate repository knowledge
        run: python3 scripts/validate_repository.py .

      - name: Check whitespace
        run: git diff --check
